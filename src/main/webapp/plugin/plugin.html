<!DOCTYPE html>
<html>

<head>
    <title>ArcGIS - AIS Location Map</title>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" href="https://js.arcgis.com/4.14/esri/css/main.css">
    <script src="https://js.arcgis.com/4.14/"></script>
    <style>
        html,
        body,
        #viewDiv {
            padding: 0;
            margin: 0;
            height: 100%;
            width: 100%;
        }
    </style>
</head>

<body>
    <div id="viewDiv"></div>

    <script>
        require([
            "esri/Map",
            "esri/views/MapView",
            "esri/widgets/Home",
            "esri/layers/TileLayer",
            "esri/layers/FeatureLayer",
            "esri/layers/GraphicsLayer",
            "esri/Graphic",
            "esri/geometry/Polygon",
            "dojo/domReady!"
        ], function (Map, MapView, Home, TileLayer, FeatureLayer, GraphicsLayer, Graphic, Polygon) {

            const urlParams = new URLSearchParams(window.location.search);
            const locCd = (urlParams.get('locCd') || '').trim().toUpperCase();
			
            // Dynamically create the status element if it is missing in the HTML body
            let statusEl = document.getElementById('mapStatus');
            if (!statusEl) {
                statusEl = document.createElement('div');
                statusEl.id = 'mapStatus';
                statusEl.style.position = 'absolute';
                statusEl.style.top = '10px';
                statusEl.style.right = '10px';
                statusEl.style.background = 'rgba(0,0,0,0.8)';
                statusEl.style.color = 'white';
                statusEl.style.padding = '5px 10px';
                statusEl.style.fontFamily = 'sans-serif';
                statusEl.style.fontSize = '12px';
                statusEl.style.borderRadius = '3px';
                statusEl.style.zIndex = '99';
                statusEl.style.display = 'block';
                document.body.appendChild(statusEl);
            }
			
            function setStatus(message, error){
				statusEl.textContent = message;
                statusEl.style.display = 'block';
                statusEl.style.background = error ? 'rgba(139,0,0,0.8)' : 'rgba(0,0,0,0.8)';
            }
            
            function notifyParent(status, locCd, message) {
                if (window.parent === window) return; // not embedded in an iframe
                window.parent.postMessage({
                    source: 'ais-plugin-map',
                    status: status,   // 'ok' | 'no-feature' | 'error'
                    locCd: locCd,
                    message: message || ''
                }, window.location.origin);
            }
            
            if (!/^[A-Z]{2}\d{11}$/.test(locCd)) {
                setStatus(locCd ? 'Invalid location code: ' + locCd : 'No location code was supplied.', true);
                notifyParent('error', locCd, 'Invalid or missing location code');
            } else {
                setStatus('Loading map for ' + locCd + '…', false);

                const map = new Map();
                const view = new MapView({ container: 'viewDiv', map: map });
                view.ui.add(new Home({ view: view }), 'top-left');

                const basemapLayer = new TileLayer({
                    url: 'https://domain/arcgis_server/rest/services/AIS_Basemap/MapServer'
                });
                map.add(basemapLayer);

                const assetLayer = new FeatureLayer({
                    url: 'https://domain/arcgis_server/rest/services/ASSETMap/MapServer/2',
                    outFields: ['*']
                });
                map.add(assetLayer);

                const graphicsLayer = new GraphicsLayer();
                map.add(graphicsLayer);

                basemapLayer.load().catch(function(error) {
                    console.warn('Basemap unavailable:', error);
                });

                function symbolFor(geom) {
                    if (!geom) return null;
                    if (geom.type === 'point' || geom.type === 'multipoint') {
                        return { type: 'simple-marker', color: [0,0,255,.8], size: 10, outline: { color: [255,255,255,1], width: 1 } };
                    }
                    if (geom.type === 'polyline') {
                        return { type: 'simple-line', color: [0,0,255,1], width: 3 };
                    }
                    return { type: 'simple-fill', color: [0,0,255,.35], outline: { color: [0,0,255,1], width: 2 } };
                }

                function showFeature(feature) {
                    const graphic = new Graphic({ geometry: feature.geometry, attributes: feature.attributes, symbol: symbolFor(feature.geometry) });
                    graphicsLayer.removeAll();
                    graphicsLayer.add(graphic);
                    return view.goTo(graphic.geometry.extent ? graphic.geometry.extent.expand(1.5) : graphic.geometry);
                }

                function queryLocation() {
                    const query = assetLayer.createQuery();
                    query.where = "LOC_CD = '" + locCd.replace(/'/g, "''") + "'";
                    query.returnGeometry = true;
                    query.outFields = ['*'];
                    query.outSpatialReference = { wkid: 102140 };

                    return assetLayer.queryFeatures(query).then(function(results) {
                        if (!results.features || results.features.length === 0) {
                            const message = 'No map feature was found for ' + locCd + '.';
                            setStatus(message, true);
                            notifyParent('no-feature', locCd, message);
                            return;
                        }
                        return showFeature(results.features[0]).then(function() {
                            setStatus('Showing location ' + locCd + '.', false);
                            notifyParent('ok', locCd, '');
                            window.setTimeout(function() { statusEl.style.display = 'none'; }, 2500);
                        });
                    });
                }

                // Catch layer-load failures as well as query failures.
                assetLayer.load()
                    .then(queryLocation)
                    .catch(function(error) {
                        console.error('Asset map unavailable:', error);
                        const message = 'Map service is unavailable for ' + locCd + '. The location code was received correctly.';
                        setStatus(message, true);
                        notifyParent('error', locCd, message);
                    });
            }
        });
    </script>
</body>

</html>
