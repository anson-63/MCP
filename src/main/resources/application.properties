# src/main/resources/application.properties
# ===================================================
# Ollama LLM Configuration
# ===================================================
ollama.base_url=
ollama.model=qwen3:4b-q4_K_M
ollama.num_ctx=2048
ollama.temperature=0
ollama.timeout_seconds=120

# ===================================================
# Deepseek API key Configuration
# ===================================================
tencent.api.key=
tencent.api.base_url=
tencent.api.model=deepseek-v4-flash
tencent.api.num_ctx=2048

# ===================================================
# Database Configuration
# ===================================================
db.user=
db.password=
db.server=
db.name=
db.pool.max_size=10
db.pool.min_idle=2
db.connection_timeout=30000
gis_db.name=
db.query_timeout_seconds=30
# ===================================================
# New: Verification Graph Properties
# Can use same model or a lighter/faster model for verification
# ===================================================
ollama.verifier.model=qwen3:4b-q4_K_M
tencent.api.verifier.model=deepseek-v4-flash

# Verification behavior
graph.max.retries=3
graph.verification.enabled=true
graph.verification.timeout.seconds=120

security.enabled=false